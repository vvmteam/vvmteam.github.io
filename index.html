<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Fisch (v15.0 - Multi-Language)</title>
    <style>
        /* --- CẤU HÌNH GIAO DIỆN --- */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ebedef; margin: 0; padding: 0; color: #333; }
        #sticky-wrapper { position: sticky; top: 0; z-index: 10000; background: rgba(235, 237, 239, 0.95); backdrop-filter: blur(10px); padding-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.2s; }
        .controls { text-align: center; margin-bottom: 10px; padding: 0 20px; }
        input[type="text"] { padding: 10px 25px; width: 100%; max-width: 500px; border-radius: 50px; border: 2px solid #dfe6e9; outline: none; font-size: 16px; transition: 0.3s; background: white; margin-bottom: 10px; }
        input[type="text"]:focus { border-color: #74b9ff; box-shadow: 0 4px 15px rgba(116, 185, 255, 0.3); }
        .filter-section { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .separator { width: 1px; height: 24px; background-color: #b2bec3; margin: 0 5px; }
        button { padding: 8px 20px; cursor: pointer; border: none; background: white; border-radius: 20px; font-weight: 600; color: #636e72; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px; }
        button:hover { background-color: #f1f2f6; transform: translateY(-2px); }
        button.mode-btn.active { background: linear-gradient(135deg, #0984e3, #74b9ff); color: white; }
        button.tab-btn.active { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; }
        button#mode-official.active { background: linear-gradient(135deg, #e17055, #ff7675); color: white; box-shadow: 0 4px 15px rgba(225, 112, 85, 0.4); }
        .column-headers { max-width: 1200px; margin: 10px auto 0; display: flex; background: #2d3436; color: #ecf0f1; font-weight: 800; padding: 12px 25px; border-radius: 12px 12px 0 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        #data-container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 0 0 16px 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); min-height: 300px; padding-bottom: 30px; overflow: visible; }
        .tier-header { background: #dfe6e9; color: #2d3436; font-weight: 900; text-align: center; padding: 10px; font-size: 1.2em; border-bottom: 2px solid #b2bec3; border-top: 1px solid #fff; box-shadow: none; position: sticky; top: var(--header-offset, 180px); z-index: 1000; }
        .row { display: flex; padding: 15px 25px; border-bottom: 1px solid #f1f2f6; align-items: center; transition: 0.2s; background: white; }
        .row:hover { background-color: #f8f9fa; position: relative; z-index: 5000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .col-name { flex: 2; font-weight: 700; color: #2d3436; position: relative; }
        .col-mid { flex: 1; text-align: center; color: #636e72; font-weight: 600; }
        .col-end { flex: 0.8; text-align: right; font-weight: 800; color: #e17055; }
        .col-status { flex: 0.8; text-align: center; font-weight: 700; color: #00b894; font-size: 0.9em; }
        .click-trigger { cursor: pointer; color: #0984e3; text-decoration: underline; text-decoration-style: dotted; }
        .click-trigger:hover { color: #d63031; }
        .hover-trigger { cursor: help; }
        .hover-wrapper { position: relative; display: inline-block; }
        .hover-images { display: none; position: fixed; z-index: 11000; background: white; padding: 15px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); border: 1px solid rgba(0,0,0,0.08); animation: fadeIn 0.2s ease-out; gap: 15px; pointer-events: none; }
        .hover-images.active { display: grid; }
        .hover-images.single-img { grid-template-columns: 1fr; width: 280px; }
        .hover-images.double-img { grid-template-columns: 1fr 1fr; width: 500px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 20000; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.open { display: flex; opacity: 1; }
        .modal-content { background: white; width: 95%; max-width: 900px; border-radius: 16px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); overflow: hidden; display: flex; flex-direction: column; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-height: 90vh; }
        .modal-overlay.open .modal-content { transform: scale(1); }
        .modal-header { padding: 15px 20px; background: #2d3436; color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .close-modal-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .modal-body { display: flex; padding: 20px; gap: 20px; overflow-y: hidden; max-height: 80vh; }
        .modal-left { flex: 1.5; display: flex; flex-direction: column; gap: 10px; justify-content: center; align-items: center; background-color: #f8f9fa; border-radius: 12px; padding: 10px; overflow: hidden; }
        .modal-right { flex: 1; border-left: 1px solid #eee; padding-left: 20px; overflow-y: auto; }
        .modal-title { font-size: 1.2em; font-weight: 800; color: #2d3436; margin-bottom: 15px; border-bottom: 2px solid #0984e3; padding-bottom: 5px; display: inline-block; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1.1em; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .stat-label { color: #636e72; font-weight: 600; }
        .stat-value { font-weight: 700; color: #2d3436; font-family: 'Consolas', monospace; }
        .modal-loading { text-align: center; padding: 50px; font-size: 1.2em; color: #636e72; width: 100%; }
        .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: #0984e3; animation: spin 1s ease-in-out infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .modal-body { flex-direction: column; overflow-y: auto; } .modal-right { border-left: none; border-top: 1px solid #eee; padding-left: 0; padding-top: 20px; } .modal-left { min-height: 200px; } }
        .img-box { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; max-height: 350px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .img-label { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; white-space: nowrap; pointer-events: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* FLOATING BUTTONS */
        .floating-btn { position: fixed; right: 30px; z-index: 9999; width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; transition: 0.3s; color: white; }
        .floating-btn:hover { transform: scale(1.1); }
        
        #refresh-btn { bottom: 30px; background: #d63031; }
        #lang-btn { bottom: 90px; background: #0984e3; font-size: 20px; font-weight: bold; }

        .site-footer { text-align: center; padding: 40px 20px 80px 20px; color: #636e72; font-size: 14px; margin-top: 30px; border-top: 1px solid #dfe6e9; background-color: #ebedef; }
        .site-footer b { color: #2d3436; font-weight: 700; }

        /* MODAL STYLES */
        #confirm-modal .modal-content { max-width: 400px; text-align: center; overflow: visible; }
        #confirm-modal .modal-header { background: #d63031; color: white; justify-content: center; padding: 15px; }
        #confirm-modal .modal-body { flex-direction: column; gap: 15px; padding: 25px 20px; overflow: visible; height: auto; }
        .confirm-btn { padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 15px; }
        .btn-yes { background: #d63031; color: white; }
        .btn-no { background: #636e72; color: white; }
    </style>
</head>
<body>
    <div id="sticky-wrapper">
        <div class="controls">
            <input type="text" id="searchInput" data-lang-key="search_placeholder" placeholder="Tìm kiếm tên, rod, value..." onkeyup="filterData()">
            <div class="filter-section">
                <div class="btn-row">
                    <button id="mode-tier" class="mode-btn active" onclick="switchMode('tier')" data-lang-key="mode_tier">Xếp hạng (Tier)</button>
                    <button id="mode-obtain" class="mode-btn" onclick="switchMode('obtain')" data-lang-key="mode_obtain">Cách nhận (Obtain)</button>
                    <div class="separator"></div>
                    <button id="mode-official" class="mode-btn" onclick="switchMode('official')">Official Value</button>
                </div>
                
                <div class="btn-row" id="tabs-standard">
                    <button id="tab-boat" class="tab-btn active" onclick="switchTab('boat')" data-lang-key="tab_boat">Thuyền</button>
                    <button id="tab-skin" class="tab-btn" onclick="switchTab('skin')" data-lang-key="tab_skin">Skin</button>
                </div>

                <div class="btn-row" id="tabs-official" style="display: none;">
                    <button id="tab-cosmetic" class="tab-btn active" onclick="switchTab('cosmetic')">Cosmetic</button>
                    <button id="tab-fish" class="tab-btn" onclick="switchTab('fish')">Fish</button>
                </div>
            </div>
        </div>
        <div class="column-headers" id="header-row"></div>
    </div>

    <div id="data-container"></div>

    <footer class="site-footer">
        <span data-lang-key="footer_text">Create and Maintaince by</span> <b>Fuyutya</b> - <span data-lang-key="last_update">Last Update</span>: <span id="last-update">...</span>
    </footer>

    <button id="lang-btn" class="floating-btn" onclick="toggleLanguage()">VI</button>
    <button id="refresh-btn" class="floating-btn" onclick="requestReload()">↻</button>

    <div id="info-modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span id="modal-item-name">Item Name</span>
                <button class="close-modal-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body-content"></div>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span data-lang-key="confirm_title">⚠️ CẢNH BÁO</span>
            </div>
            <div class="modal-body">
                <p style="font-size: 1.1em; color: #2d3436;" data-lang-key="confirm_ask">Bạn có chắc chắn muốn tải lại?</p>
                <p style="color: #636e72; font-size: 0.9em; margin-bottom: 20px;" data-lang-key="confirm_desc">
                    Hành động này sẽ xóa toàn bộ Cache cục bộ và tải mới dữ liệu từ Google Sheet & Wiki.
                </p>
                <div style="display: flex; justify-content: center; gap: 15px;">
                    <button class="confirm-btn btn-yes" onclick="executeReload()" data-lang-key="btn_yes">Đồng ý</button>
                    <button class="confirm-btn btn-no" onclick="closeConfirmModal()" data-lang-key="btn_no">Hủy bỏ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 0. CẤU HÌNH NGÔN NGỮ (DICTIONARY)
        // ==========================================
        const TRANSLATIONS = {
            vi: {
                search_placeholder: "Tìm kiếm tên, rod, value...",
                mode_tier: "Xếp hạng",
                mode_obtain: "Cách nhận",
                tab_boat: "Thuyền",
                tab_skin: "Skin",
                footer_text: "Phát triển và bảo trì bởi",
                last_update: "Cập nhật cuối",
                confirm_title: "⚠️ CẢNH BÁO",
                confirm_ask: "Bạn có chắc chắn muốn tải lại?",
                confirm_desc: "Hành động này sẽ xóa toàn bộ Cache cục bộ và tải mới dữ liệu.",
                btn_yes: "Đồng ý",
                btn_no: "Hủy bỏ",
                // Headers
                col_item: "Tên Vật Phẩm",
                col_value: "Giá Trị",
                col_demand: "Nhu Cầu",
                col_status: "Trạng Thái",
                col_skin: "Tên Skin",
                col_rod: "Cần Câu",
                // Modal
                stat_price: "Giá",
                stat_speed: "Tốc độ",
                stat_turn: "Bẻ lái",
                stat_accel: "Gia tốc",
                stat_seat: "Chỗ ngồi",
                modal_title_wiki: "Thông số (Fischipedia)",
                modal_loading: "Đang tải dữ liệu...",
                modal_loading_sub: "Sẽ không tải lại cho đến thứ 2 tuần sau",
                open_wiki: "Mở Fischipedia.org",
                error_proxy: "Không thể tải dữ liệu (Lỗi Proxy). Vui lòng thử lại sau.",
                no_image: "📷 Không có ảnh",
                img_game: "Trong Game",
                img_menu: "Menu/Icon"
            },
            en: {
                search_placeholder: "Search name, rod, value...",
                mode_tier: "Tier List",
                mode_obtain: "Obtain Method",
                tab_boat: "Boats",
                tab_skin: "Skins",
                footer_text: "Created and Maintained by",
                last_update: "Last Update",
                confirm_title: "⚠️ WARNING",
                confirm_ask: "Are you sure you want to reload?",
                confirm_desc: "This will clear all Local Cache and fetch fresh data from Google Sheet & Wiki.",
                btn_yes: "Yes",
                btn_no: "Cancel",
                // Headers
                col_item: "ITEM NAME",
                col_value: "VALUE",
                col_demand: "DEMAND",
                col_status: "STATUS",
                col_skin: "SKIN NAME",
                col_rod: "ROD NAME",
                // Modal
                stat_price: "Price",
                stat_speed: "Speed",
                stat_turn: "Steering",
                stat_accel: "Acceleration",
                stat_seat: "Seats",
                modal_title_wiki: "Stats (Fischipedia)",
                modal_loading: "Loading data...",
                modal_loading_sub: "Will not reload until next Monday",
                open_wiki: "Open Fischipedia.org",
                error_proxy: "Failed to load data (Proxy Error). Please try again later.",
                no_image: "📷 No Image",
                img_game: "In-Game",
                img_menu: "Menu/Icon"
            }
        };

        let currentLang = localStorage.getItem('fisch_lang') || 'vi';

        // Hàm lấy text theo key và ngôn ngữ hiện tại
        function t(key) {
            return TRANSLATIONS[currentLang][key] || key;
        }

        // Hàm đổi ngôn ngữ
        function toggleLanguage() {
            currentLang = (currentLang === 'vi') ? 'en' : 'vi';
            localStorage.setItem('fisch_lang', currentLang);
            applyLanguage();
        }

        function applyLanguage() {
            // Cập nhật nút
            document.getElementById('lang-btn').innerText = currentLang.toUpperCase();
            
            // Cập nhật các element tĩnh có data-lang-key
            document.querySelectorAll('[data-lang-key]').forEach(el => {
                const key = el.getAttribute('data-lang-key');
                if (el.tagName === 'INPUT') {
                    el.placeholder = t(key);
                } else {
                    el.innerText = t(key);
                }
            });

            // Cập nhật các phần động (Header, Modal nếu đang mở)
            updateHeaders();
            const modal = document.getElementById('info-modal');
            if (modal.classList.contains('open')) {
                // Render lại modal nếu đang mở để cập nhật ngôn ngữ
                const title = document.getElementById('modal-item-name').innerText;
                const key = normalizeKey(title); // Logic tạm để tìm lại key, thực tế nên lưu key vào modal
                if(imageCache[key]) renderModalContent(key); 
            }
        }

        // ==========================================
        // 1. CẤU HÌNH LIÊN KẾT
        // ==========================================
        const SHEET_CONFIG = {
            tier_boat:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqeggDsHCnG_nIouEmQYsC2C3_GkftknlXwuSXgEzgY7fU-lmTiRYYFJ6qsivS_wVcjP_vyPqFBhIL/pub?gid=0&single=true&output=csv',
            tier_skin:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqeggDsHCnG_nIouEmQYsC2C3_GkftknlXwuSXgEzgY7fU-lmTiRYYFJ6qsivS_wVcjP_vyPqFBhIL/pub?gid=701267659&single=true&output=csv',
            obtain_boat: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqeggDsHCnG_nIouEmQYsC2C3_GkftknlXwuSXgEzgY7fU-lmTiRYYFJ6qsivS_wVcjP_vyPqFBhIL/pub?gid=1752951421&single=true&output=csv',
            obtain_skin: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqeggDsHCnG_nIouEmQYsC2C3_GkftknlXwuSXgEzgY7fU-lmTiRYYFJ6qsivS_wVcjP_vyPqFBhIL/pub?gid=2094862161&single=true&output=csv',
            images:      'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqeggDsHCnG_nIouEmQYsC2C3_GkftknlXwuSXgEzgY7fU-lmTiRYYFJ6qsivS_wVcjP_vyPqFBhIL/pub?gid=138903966&single=true&output=csv',
            official_cosmetic: 'https://docs.google.com/spreadsheets/d/1saOLjcowAxI1vkJZkwtgFMAEtmurA68zhCguQN0oBMY/edit?gid=0#gid=0',
            official_fish:     'https://docs.google.com/spreadsheets/d/1saOLjcowAxI1vkJZkwtgFMAEtmurA68zhCguQN0oBMY/edit?gid=1767682450#gid=1767682450'
        };

        const COL_MAP = {
            tier:   { name: 0, val: 1, demand: 2 }, 
            obtain_boat: { name: 0, val: 1 },       
            obtain_skin: { name: 0, rod: 1, val: 2 },
            official: { name: 0, val: 1, demand: 2, status: 3 },
            images: { 
                name: 0, img1: 1, img2: 2, wiki: 3, flag: 4, last_update: 6 
            }, 
            q_flag: 16 
        };

        let currentMode = 'tier';
        let currentTab  = 'boat';
        let imageCache = {}; 
        let dataCache = {};     

        function normalizeKey(str) {
            if (!str) return "";
            return str.trim().toUpperCase().replace(/[‘’`]/g, "'");
        }

        function updateStickyOffset() {
            const stickyHeader = document.getElementById('sticky-wrapper');
            if (stickyHeader) {
                const height = stickyHeader.offsetHeight;
                document.documentElement.style.setProperty('--header-offset', (height - 1) + 'px');
            }
        }
        window.addEventListener('load', () => {
            applyLanguage(); // Áp dụng ngôn ngữ khi load
            updateStickyOffset();
        });
        window.addEventListener('resize', updateStickyOffset);

        // ==========================================
        // CACHING LOGIC
        // ==========================================
        function getNextMondayTimestamp() {
            const d = new Date();
            d.setDate(d.getDate() + (1 + 7 - d.getDay()) % 7 || 7); 
            d.setHours(0, 0, 0, 0);
            return d.getTime();
        }

        function saveToCache(key, data) {
            const cacheItem = {
                data: data,
                expiry: getNextMondayTimestamp()
            };
            localStorage.setItem(`fisch_cache_${key}`, JSON.stringify(cacheItem));
        }

        function getFromCache(key) {
            const cachedRaw = localStorage.getItem(`fisch_cache_${key}`);
            if (!cachedRaw) return null;
            try {
                const cached = JSON.parse(cachedRaw);
                if (Date.now() > cached.expiry) {
                    localStorage.removeItem(`fisch_cache_${key}`);
                    return null;
                }
                return cached.data;
            } catch (e) { return null; }
        }

        // ==========================================
        // PROXY SYSTEM
        // ==========================================
        async function fetchTextWithProxy(url) {
            const proxies = [
                {
                    name: "CodeTabs",
                    getUrl: (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
                },
                {
                    name: "CorsLol",
                    getUrl: (u) => `https://api.cors.lol/?url=${encodeURIComponent(u)}`
                }
            ];

            for (let proxy of proxies) {
                try {
                    const res = await fetch(proxy.getUrl(url));
                    if (!res.ok) throw new Error(`Status ${res.status}`);
                    const content = await res.text();
                    
                    if (content.length < 500 || content.includes("Attention Required! | Cloudflare")) {
                        throw new Error("Blocked by Cloudflare");
                    }
                    return content;
                } catch (e) {
                    continue; 
                }
            }
            throw new Error("All proxies failed.");
        }

        async function fetchSheet(key, forceUpdate) {
            let url = SHEET_CONFIG[key];
            if (!url) { console.error(`Thiếu link: ${key}`); return null; }
            const timeStamp = forceUpdate ? `&t=${Date.now()}` : '';

            if (key.includes('official')) {
                try {
                    const idMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                    const gidMatch = url.match(/[#&?]gid=([0-9]+)/);
                    const sheetId = idMatch ? idMatch[1] : null;
                    const gid = gidMatch ? gidMatch[1] : '0';
                    if(sheetId) {
                        const gvizLink = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${gid}`;
                        try { return await fetchTextWithProxy(gvizLink + timeStamp); } catch(e) { return null; }
                    }
                } catch(e) { return null; }
            } 
            
            try {
                const res = await fetch(url + timeStamp);
                if (!res.ok) throw new Error("CORS Blocked");
                return await res.text();
            } catch (e) {
                try { return await fetchTextWithProxy(url + timeStamp); } catch(err) { return null; }
            }
        }

        function splitCSV(line) {
            const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            return cols.map(c => c.replace(/^"|"$/g, '').trim().replace(/""/g, '"'));
        }

        async function loadAll(forceUpdate = false) {
            const container = document.getElementById('data-container');
            if (Object.keys(imageCache).length === 0 || forceUpdate) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">Checking resources...</div>';
                await fetchImages(forceUpdate);
            }
            
            let sheetKey = (currentMode === 'official') ? `official_${currentTab}` : `${currentMode}_${currentTab}`;
            updateHeaders(); // Cập nhật header theo ngôn ngữ
            
            const tabsStd = document.getElementById('tabs-standard');
            const tabsOff = document.getElementById('tabs-official');
            
            if (tabsStd && tabsOff) {
                if (currentMode === 'official') {
                    tabsStd.style.display = 'none'; tabsOff.style.display = 'flex';
                } else {
                    tabsStd.style.display = 'flex'; tabsOff.style.display = 'none';
                }
            }
            setTimeout(updateStickyOffset, 50);

            if (!forceUpdate && dataCache[sheetKey]) {
                renderData(dataCache[sheetKey]);
            } else {
                container.innerHTML = '<div style="text-align:center; padding:40px;">Loading data...</div>';
                const csv = await fetchSheet(sheetKey, forceUpdate);
                if (csv) {
                    dataCache[sheetKey] = csv;
                    renderData(csv);
                }
            }
        }

        async function fetchImages(forceUpdate) {
            const csv = await fetchSheet('images', forceUpdate);
            if (!csv) return;
            imageCache = {}; 
            const lines = csv.split('\n');
            if (lines.length > 0) {
                const firstRowCols = splitCSV(lines[0]);
                const dateVal = firstRowCols[COL_MAP.images.last_update];
                document.getElementById('last-update').innerText = dateVal ? dateVal : "Unknown";
            }
            lines.forEach(line => {
                const cols = splitCSV(line);
                const name = cols[COL_MAP.images.name]?.trim();
                if (name) {
                    const img1 = cols[COL_MAP.images.img1]?.trim();
                    const img2 = cols[COL_MAP.images.img2]?.trim();
                    const wiki = cols[COL_MAP.images.wiki]?.trim();
                    const flag = cols[COL_MAP.images.flag]?.trim().toLowerCase();
                    const key = normalizeKey(name);
                    
                    imageCache[key] = {
                        nameDisplay: name,
                        urls: [img1, img2].filter(url => url && url.length > 5),
                        wikiLink: wiki,
                        isBoat: (flag && flag.includes('boat')),
                        stats: null,
                        fetched: false
                    };
                }
            });
        }

        function updateHeaders() {
            const headerDiv = document.getElementById('header-row');
            let html = '';
            if (currentMode === 'official') {
                html = `<div style="flex: 2;">${t('col_item')}</div><div style="flex: 1; text-align: center;">${t('col_value')}</div><div style="flex: 0.8; text-align: right;">${t('col_demand')}</div><div style="flex: 0.8; text-align: center;">${t('col_status')}</div>`;
            } else if (currentMode === 'tier') {
                html = `<div style="flex: 2;">${t('col_item')}</div><div style="flex: 1; text-align: center;">${t('col_value')}</div><div style="flex: 0.8; text-align: right;">${t('col_demand')}</div>`;
            } else {
                if (currentTab === 'skin') {
                     html = `<div style="flex: 2;">${t('col_skin')}</div><div style="flex: 1; text-align: center;">${t('col_rod')}</div><div style="flex: 0.8; text-align: right;">${t('col_value')}</div>`;
                } else {
                     html = `<div style="flex: 2;">${t('col_item')}</div><div style="flex: 1; text-align: center;"></div><div style="flex: 0.8; text-align: right;">${t('col_value')}</div>`;
                }
            }
            headerDiv.innerHTML = html;
        }

        function renderData(csvText) {
            const container = document.getElementById('data-container');
            container.innerHTML = '';
            const lines = csvText.split('\n');
            let currentTierName = "";

            lines.forEach(line => {
                if (!line.trim()) return;
                const cols = splitCSV(line); 
                let name, col2, col3, col4;
                let isHeader = false;

                if (currentMode === 'official') {
                    name = cols[COL_MAP.official.name]; col2 = cols[COL_MAP.official.val];    
                    col3 = cols[COL_MAP.official.demand]; col4 = cols[COL_MAP.official.status]; 
                    if ((!col2 || !col2.trim()) && (!col3 || !col3.trim())) isHeader = true;
                } else {
                    const valQ = cols[COL_MAP.q_flag] ? cols[COL_MAP.q_flag].trim() : '';
                    isHeader = (valQ !== ''); 
                    if (currentMode === 'tier') {
                        name = cols[COL_MAP.tier.name]; col2 = cols[COL_MAP.tier.val]; col3 = cols[COL_MAP.tier.demand]; 
                    } else if (currentTab === 'skin') {
                        name = cols[COL_MAP.obtain_skin.name]; col2 = cols[COL_MAP.obtain_skin.rod]; col3 = cols[COL_MAP.obtain_skin.val]; 
                    } else {
                        name = cols[COL_MAP.obtain_boat.name]; col2 = ''; col3 = cols[COL_MAP.obtain_boat.val]; 
                    }
                }

                if (!name) return;
                if (name.includes('google.visualization') || name.toUpperCase() === 'NAME' || name.toUpperCase().includes('VALUE LIST')) return;

                if (isHeader) {
                    currentTierName = name;
                    const div = document.createElement('div');
                    div.className = 'tier-header';
                    div.textContent = name;
                    div.setAttribute('data-tier-name', name);
                    container.appendChild(div);
                } else {
                    const row = document.createElement('div');
                    row.className = 'row item-entry';
                    row.setAttribute('data-parent-tier', currentTierName);

                    let interactionHtml = '';
                    const key = normalizeKey(name);
                    const itemData = imageCache[key];
                    
                    if (itemData) {
                        if (itemData.isBoat && itemData.wikiLink) {
                            interactionHtml = `<span class="hover-wrapper click-trigger" onclick="openModal('${key.replace(/'/g, "\\'")}')">${name}</span>`;
                        } else if (itemData.urls.length > 0) {
                            const imgsJson = JSON.stringify(itemData.urls).replace(/"/g, '&quot;');
                            interactionHtml = `
                                <span class="hover-wrapper hover-trigger" onmouseenter="lazyLoadImg(this)" onmouseleave="hideImg(this)" data-imgs="${imgsJson}">
                                    ${name}
                                    <div class="hover-images"></div>
                                </span>`;
                        } else { interactionHtml = name; }
                    } else { interactionHtml = name; }

                    let extraCol = '';
                    if (currentMode === 'official') extraCol = `<div class="col-status">${col4 || ''}</div>`;

                    row.innerHTML = `
                        <div class="col-name">${interactionHtml}</div>
                        <div class="col-mid">${col2 || ''}</div>
                        <div class="col-end">${col3 || ''}</div>
                        ${extraCol}
                    `;
                    container.appendChild(row);
                }
            });
            filterData(); 
            updateStickyOffset();
        }

        // ==========================================
        // AUTO-SCRAPER
        // ==========================================
        function getFischStats(doc, label) {
            const headings = doc.querySelectorAll('.data-heading');
            for (let h of headings) {
                if (h.textContent.trim().toLowerCase().includes(label.toLowerCase())) {
                    let sibling = h.nextElementSibling;
                    if (sibling && sibling.classList.contains('data-content')) {
                         return sibling.textContent.trim();
                    }
                }
            }
            return '?';
        }

        function getFischPrice(doc) {
            const headings = doc.querySelectorAll('.data-heading');
            for (let h of headings) {
                if (h.textContent.trim().toLowerCase() === 'price') {
                    let contentNode = h.nextElementSibling;
                    if (contentNode) {
                        const isRobux = contentNode.querySelector('img[alt*="Robux"], span[title="Robux"]');
                        let priceText = contentNode.textContent.trim();
                        if (isRobux) {
                            return priceText + " Robux";
                        }
                        return priceText;
                    }
                }
            }
            return '?';
        }

        async function fetchHighResImage(filePageUrl) {
            if (!filePageUrl) return null;
            try {
                const fullUrl = "https://fischipedia.org" + filePageUrl;
                const html = await fetchTextWithProxy(fullUrl);
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                const link = doc.querySelector('.fullImageLink a');
                if (link) {
                    let src = link.getAttribute('href');
                    if (src.startsWith('//')) src = 'https:' + src;
                    return src;
                }
            } catch(e) {}
            return null;
        }

        async function openModal(itemKey) {
            const modal = document.getElementById('info-modal');
            const modalBody = document.getElementById('modal-body-content');
            const title = document.getElementById('modal-item-name');
            const data = imageCache[itemKey]; 
            
            if (!data) return;
            
            modal.classList.add('open');
            title.innerText = data.nameDisplay;

            const cachedData = getFromCache(itemKey);
            if (cachedData) {
                data.stats = cachedData.stats;
                data.urls = cachedData.urls;
                data.fetched = true;
                renderModalContent(itemKey); // Render sẽ dùng hàm t() để dịch
                return;
            }

            if ((!data.fetched || (data.stats && data.stats.speed === 'Error')) && data.wikiLink) {
                modalBody.innerHTML = `
                    <div class="modal-loading">
                        <div class="spinner"></div>
                        <div>${t('modal_loading')}</div>
                        <small style="font-size:0.8em; opacity:0.7">${t('modal_loading_sub')}</small>
                    </div>`;
                await scrapeWikiData(itemKey, data.wikiLink);
            }
            renderModalContent(itemKey);
        }

        async function scrapeWikiData(itemKey, wikiUrl) {
            try {
                let targetUrl = wikiUrl;
                if (!targetUrl.includes('fischipedia.org')) {
                     let pageName = imageCache[itemKey].nameDisplay.replace(/ /g, '_');
                     targetUrl = `https://fischipedia.org/wiki/${pageName}`;
                }

                const html = await fetchTextWithProxy(targetUrl);
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                const stats = {
                    speed: getFischStats(doc, 'Speed'),
                    turn:  getFischStats(doc, 'Steering'),
                    accel: getFischStats(doc, 'Acceleration'),
                    seat:  getFischStats(doc, 'Seats'),
                    price: getFischPrice(doc)
                };
                
                let gameImgFileUrl = null;
                let menuImgFileUrl = null;

                const tables = doc.querySelectorAll('table.wikitable');
                tables.forEach(table => {
                    const headers = table.querySelectorAll('th');
                    const cells = table.querySelectorAll('td');
                    headers.forEach((th, index) => {
                        const txt = th.textContent.toLowerCase();
                        const cell = cells[index];
                        if (cell) {
                            const link = cell.querySelector('a[href^="/wiki/File:"]');
                            if (link) {
                                const href = link.getAttribute('href');
                                if (txt.includes('game')) gameImgFileUrl = href;
                                else if (txt.includes('menu') || txt.includes('shipwright')) menuImgFileUrl = href;
                            }
                        }
                    });
                });

                if (!menuImgFileUrl) {
                    const mainThumb = doc.querySelector('.infobox-image a.image');
                    if (mainThumb) menuImgFileUrl = mainThumb.getAttribute('href');
                }

                const [imgGame, imgMenu] = await Promise.all([
                    fetchHighResImage(gameImgFileUrl),
                    fetchHighResImage(menuImgFileUrl)
                ]);

                const finalUrls = [imgGame, imgMenu].filter(u => u);
                
                if (finalUrls.length === 0) {
                     const thumbs = doc.querySelectorAll('.infobox-image img, .wikitable img');
                     thumbs.forEach(img => {
                         let src = img.getAttribute('src');
                         if(src) {
                             if(src.startsWith('//')) src = 'https:' + src;
                             src = src.replace('/thumb/', '/').replace(/\/\d+px-.+$/, '');
                             finalUrls.push(src);
                         }
                     });
                }

                const uniqueUrls = [...new Set(finalUrls)];

                const dataToCache = { stats: stats, urls: uniqueUrls };
                saveToCache(itemKey, dataToCache);

                imageCache[itemKey].stats = stats;
                if (uniqueUrls.length > 0) imageCache[itemKey].urls = uniqueUrls;
                imageCache[itemKey].fetched = true;

            } catch (err) {
                console.error("[Scraper] Error:", err);
                imageCache[itemKey].stats = { speed: 'Error', turn: 'Error', accel: 'Error', seat: 'Error' };
                imageCache[itemKey].fetched = true;
            }
        }

        // --- HÀM RENDER MODAL CẬP NHẬT ĐA NGÔN NGỮ ---
        function renderModalContent(itemKey) {
            // Nhận key thay vì object data để lấy lại data từ cache và dịch lại
            const data = (typeof itemKey === 'string') ? imageCache[itemKey] : itemKey;
            const modalBody = document.getElementById('modal-body-content');
            if (!data) return;

            let imgHtml = '';
            if (data.urls && data.urls.length > 0) {
                data.urls.forEach((url, index) => { 
                    let label = t('no_image');
                    if (data.urls.length > 1) label = (index === 0) ? t('img_game') : t('img_menu'); 
                    imgHtml += `
                        <div class="img-box">
                            <img src="${url}" referrerpolicy="no-referrer" onerror="this.onerror=null;this.src='https://placehold.co/400x200?text=No+Image'">
                            <span class="img-label">${label}</span>
                        </div>`; 
                });
            } else { 
                imgHtml = `
                    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; color:#999;">
                        <span>${t('no_image')}</span>
                    </div>`; 
            }

            const s = data.stats || { speed: '?', turn: '?', accel: '?', seat: '?' };
            const isError = s.speed === 'Error';

            modalBody.innerHTML = `
                <div class="modal-left" id="modal-images-container">${imgHtml}</div>
                <div class="modal-right">
                    <div class="modal-title">
                        ${t('modal_title_wiki')} 
                        ${isError ? '<span style="color:red; font-size:0.6em">(Error)</span>' : ''}
                    </div>
                    <div id="modal-stats-container">
                        ${isError ? `<div style="color:#d63031; padding:10px; background:#ffeaa7; border-radius:8px; margin-bottom:10px; font-size:0.9em;">${t('error_proxy')}</div>` : ''}
                        
                        <div class="stat-row"><span class="stat-label">${t('stat_price')}:</span> <span class="stat-value" style="color:#e17055">${s.price || '?'}</span></div>
                        <div class="stat-row"><span class="stat-label">${t('stat_speed')}:</span> <span class="stat-value">${s.speed}</span></div>
                        <div class="stat-row"><span class="stat-label">${t('stat_turn')}:</span> <span class="stat-value">${s.turn}</span></div>
                        <div class="stat-row"><span class="stat-label">${t('stat_accel')}:</span> <span class="stat-value">${s.accel}</span></div>
                        <div class="stat-row"><span class="stat-label">${t('stat_seat')}:</span> <span class="stat-value">${s.seat}</span></div>
                        
                        <div style="margin-top:20px; font-size:0.9em; text-align:right">
                            <a href="${data.wikiLink || 'https://fischipedia.org'}" target="_blank" style="color:white; background:#0984e3; padding:8px 15px; border-radius:4px; text-decoration:none; display:inline-block;">
                                ${t('open_wiki')} ↗
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        function requestReload() { document.getElementById('confirm-modal').classList.add('open'); }
        function closeConfirmModal() { document.getElementById('confirm-modal').classList.remove('open'); }
        function executeReload() {
            closeConfirmModal();
            const btn = document.getElementById('refresh-btn');
            btn.style.transform = 'rotate(360deg)';
            setTimeout(() => btn.style.transform = '', 500);

            let sheetKey = (currentMode === 'official') ? `official_${currentTab}` : `${currentMode}_${currentTab}`;
            dataCache[sheetKey] = null;

            Object.keys(localStorage).forEach(key => {
                if(key.startsWith('fisch_cache_')) localStorage.removeItem(key);
            });

            loadAll(true);
        }

        function closeModal(event) { document.getElementById('info-modal').classList.remove('open'); }

        window.lazyLoadImg = function(el) {
            const container = el.querySelector('.hover-images');
            if (container.classList.contains('active')) return;
            const imgsData = el.getAttribute('data-imgs');
            if (!imgsData) return;
            const rect = el.getBoundingClientRect();
            container.style.top = (rect.bottom + 10) + 'px';
            container.style.left = (rect.left + 20) + 'px';
            const imgs = JSON.parse(imgsData);
            const gridClass = imgs.length === 1 ? 'single-img' : 'double-img';
            container.className = `hover-images active ${gridClass}`;
            if (!container.hasChildNodes()) {
                let html = '';
                imgs.forEach(url => { html += `<div class="img-box"><img src="${url}" referrerpolicy="no-referrer"></div>`; });
                container.innerHTML = html;
            }
        }
        window.hideImg = function(el) { const container = el.querySelector('.hover-images'); if (container) { container.classList.remove('active'); } }

        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'official') { currentTab = 'cosmetic'; } else { currentTab = 'boat'; }
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const tabBtn = document.getElementById('tab-' + currentTab);
            if(tabBtn) tabBtn.classList.add('active');
            loadAll(false);
            window.scrollTo(0, 0); 
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            loadAll(false);
            window.scrollTo(0, 0); 
        }

        function filterData() {
            const filter = document.getElementById('searchInput').value.toUpperCase().trim();
            const items = document.querySelectorAll('.item-entry');
            const tiers = document.querySelectorAll('.tier-header');
            let visibleTiers = new Set();
            items.forEach(item => {
                const txtName = item.querySelector('.col-name').textContent || "";
                const txtMid = item.querySelector('.col-mid').textContent || "";
                if (txtName.toUpperCase().includes(filter) || txtMid.toUpperCase().includes(filter)) {
                    item.style.display = 'flex';
                    const parentTier = item.getAttribute('data-parent-tier');
                    if (parentTier) visibleTiers.add(parentTier);
                } else { item.style.display = 'none'; }
            });
            tiers.forEach(tier => {
                tier.style.display = (filter === "" || visibleTiers.has(tier.getAttribute('data-tier-name'))) ? 'block' : 'none';
            });
            updateStickyOffset();
        }
        
        // Init
        // loadAll(); // Đã có window.load gọi
    </script>
</body>
